# Throwaway single-node Elasticsearch for CI and local testing of docker-compose-full.yaml.
# Camunda 8.10 does not bundle Elasticsearch; production users point ELASTICSEARCH_* in .env
# at their own cluster. This file provides one reachable via host.docker.internal:9200.
services:
  elasticsearch: # https://hub.docker.com/_/elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.11
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      # allow running with low disk space
      - cluster.routing.allocation.disk.threshold_enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    mem_limit: 1g
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cat/health?h=status | grep -Eq 'green|yellow'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
