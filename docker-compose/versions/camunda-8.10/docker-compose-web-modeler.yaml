# Docker Compose file for Web Modeler Self-Managed. This file can be used stand-alone. It will install Web Modeler Dependencies:
# 1. identity
# 2. keycloak
# Note: this file is using Mailpit to simulate a mail server

services:

  web-modeler-db:
    container_name: web-modeler-db
    image: postgres:${POSTGRES_VERSION}
    restart: on-failure
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${WEBMODELER_DB_NAME}", "-U", "${WEBMODELER_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      POSTGRES_DB: ${WEBMODELER_DB_NAME}
      POSTGRES_USER: ${WEBMODELER_DB_USER}
      POSTGRES_PASSWORD: ${WEBMODELER_DB_PASSWORD}
    networks:
      - web-modeler
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - postgres-web:/var/lib/postgresql/data

  hub-websockets:
    container_name: hub-websockets
    image: camunda/hub-websockets:${CAMUNDA_WEB_MODELER_VERSION}
    ports:
      - "8060:8060"
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://127.0.0.1:8060/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      APP_NAME: "Web Modeler Self-Managed WebSockets"
      APP_DEBUG: "true"
      PUSHER_APP_ID: ${WEBMODELER_PUSHER_APP_ID}
      PUSHER_APP_KEY: ${WEBMODELER_PUSHER_KEY}
      PUSHER_APP_SECRET: ${WEBMODELER_PUSHER_SECRET}
    networks:
      - web-modeler
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mailpit:
    # If you want to use your own SMTP server, you can remove this container
    # and configure RESTAPI_MAIL_HOST, RESTAPI_MAIL_PORT, REST_API_MAIL_USER,
    # REST_API_MAIL_PASSWORD and RESTAPI_MAIL_ENABLE_TLS in hub
    container_name: mailpit
    image: axllent/mailpit:${MAILPIT_VERSION}
    ports:
      - "1025:1025"
      - "8075:8025"
    restart: on-failure
    healthcheck:
      test: ["CMD", "/usr/bin/nc", "-z", "localhost", "1025"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - web-modeler
    extra_hosts:
      - "host.docker.internal:host-gateway"

  hub:
    container_name: hub
    image: camunda/hub:${CAMUNDA_WEB_MODELER_VERSION}
    ports:
      - "8070:8081"
    restart: on-failure
    depends_on:
      web-modeler-db:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      identity:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-O-", "--no-verbose", "--tries=1", "http://localhost:8091/health/readiness" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    environment:
      JAVA_OPTIONS: -Xmx512m
      SPRING_DATASOURCE_PASSWORD: ${WEBMODELER_DB_PASSWORD}
      RESTAPI_PUSHER_APP_ID: ${WEBMODELER_PUSHER_APP_ID}
      RESTAPI_PUSHER_KEY: ${WEBMODELER_PUSHER_KEY}
      RESTAPI_PUSHER_SECRET: ${WEBMODELER_PUSHER_SECRET}
    env_file:
      - path: .env
        required: true
    volumes:
      - "./.web-modeler/application.yaml:/home/runner/config/application.yaml:ro"
    networks:
      - web-modeler
      - camunda-platform
    extra_hosts:
      - "host.docker.internal:host-gateway"

  identity: # https://docs.camunda.io/docs/self-managed/setup/deploy/other/docker/#identity
    container_name: identity
    image: camunda/identity:${CAMUNDA_IDENTITY_VERSION}
    ports:
      - "8084:8084"
    env_file:
      - path: .env
        required: true
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 5s
      timeout: 15s
      retries: 30
      start_period: 60s
    restart: on-failure
    volumes:
      - "./.identity/application.yaml:/app/application.yaml"
    configs:
      - source: identity-web-modeler-config
        target: /app/config/application-web-modeler.yaml
    networks:
      - camunda-platform
      - identity-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      keycloak:
        condition: service_healthy

  postgres: # https://hub.docker.com/_/postgres
    container_name: postgres
    image: postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - identity-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  keycloak: # https://hub.docker.com/r/camunda/keycloak
    container_name: keycloak
    image: camunda/keycloak:${KEYCLOAK_SERVER_VERSION}
    command: [start]
    ports:
      - "18080:18080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 18080
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_TRANSACTION_XA_ENABLED: "false"
    restart: on-failure
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - >-
          exec 3<>/dev/tcp/127.0.0.1/9000 &&
          echo -e 'GET /auth/health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          timeout 5 cat <&3 | grep -q '200 OK'
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 30s
    networks:
      - camunda-platform
      - identity-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

networks:
  camunda-platform:
    name: camunda-platform
  identity-network:
    name: identity-network
  web-modeler:
    name: web-modeler

volumes:
  postgres:
  postgres-web:

configs:
  identity-web-modeler-config:
    content: |
      keycloak:
        clients:
          - name: orchestration
            id: "$${ORCHESTRATION_CLIENT_ID:orchestration}"
            secret: "$${ORCHESTRATION_CLIENT_SECRET:secret}"
            type: M2M
