name: Install Playwright
description: Install Playwright and its dependencies

inputs:
  working-directory:
    description: Path of Playwright config and tests
  browsers:
    description: Playwright browsers to install
    default: chromium

runs:
  using: composite
  steps:
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      id: npm-cache
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ inputs.browsers }}-${{ hashFiles('**/package-lock.json') }}

    - name: Check cache hit
      shell: bash
      run: |
        echo "npm cache hit: ${{ steps.npm-cache.outputs.cache-hit }}"
        echo "playwright cache hit: ${{ steps.playwright-cache.outputs.cache-hit }}"

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 24

    - name: Install dependencies
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      run: npm ci

    - name: Install Playwright browsers
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      run: |
        if [[ "${{ steps.playwright-cache.outputs.cache-hit }}" == "true" ]]; then
          npx playwright install-deps ${{ inputs.browsers }}
        else
          npx playwright install --with-deps ${{ inputs.browsers }}
        fi
